<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#7209b7" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">SYSTEM ARCHITECTURE</text>

  <!-- User Layer -->
  <rect x="320" y="45" width="160" height="40" rx="8" fill="#2d2d44" stroke="#7209b7" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="70" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">👤 User</text>

  <!-- Arrow down -->
  <line x1="400" y1="85" x2="400" y2="105" stroke="#7209b7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Interface Layer -->
  <rect x="130" y="108" width="540" height="50" rx="8" fill="#1e1e36" stroke="#3a3a5c" stroke-width="1"/>
  <text x="400" y="125" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">INTERFACE LAYER</text>

  <rect x="150" y="118" width="140" height="32" rx="6" fill="#2d2d44" stroke="#7209b7" stroke-width="1.5"/>
  <text x="220" y="139" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12">💻 CLI (Click)</text>

  <rect x="510" y="118" width="140" height="32" rx="6" fill="#2d2d44" stroke="#7209b7" stroke-width="1.5"/>
  <text x="580" y="139" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12">🌐 Streamlit Web</text>

  <!-- Arrows down from interfaces -->
  <line x1="220" y1="150" x2="400" y2="178" stroke="#555577" stroke-width="1.5"/>
  <line x1="580" y1="150" x2="400" y2="178" stroke="#555577" stroke-width="1.5"/>

  <!-- Core Engine -->
  <rect x="260" y="175" width="280" height="42" rx="8" fill="#2d2d44" stroke="#7209b7" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="195" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">⚙️ ScienceExplainer Core</text>
  <text x="400" y="210" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">explain • search • validate • export</text>

  <!-- Arrows down from core -->
  <line x1="310" y1="217" x2="200" y2="248" stroke="#555577" stroke-width="1.5"/>
  <line x1="400" y1="217" x2="400" y2="248" stroke="#7209b7" stroke-width="2"/>
  <line x1="490" y1="217" x2="600" y2="248" stroke="#555577" stroke-width="1.5"/>

  <!-- LLM Box -->
  <rect x="310" y="250" width="180" height="42" rx="8" fill="#2d2d44" stroke="#7209b7" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="270" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🤖 Ollama / Gemma 3</text>
  <text x="400" y="285" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Local LLM Inference</text>

  <!-- Safety Database -->
  <rect x="80" y="250" width="180" height="42" rx="8" fill="#2d2d44" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="270" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🛡️ SafetyDatabase</text>
  <text x="170" y="285" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">10+ chemicals • PPE • Risk</text>

  <!-- Equipment Manager -->
  <rect x="540" y="250" width="180" height="42" rx="8" fill="#2d2d44" stroke="#2ecc71" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="630" y="270" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🔧 EquipmentManager</text>
  <text x="630" y="285" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">15+ items • Costs • Alts</text>

  <!-- Bottom row arrows -->
  <line x1="170" y1="292" x2="170" y2="318" stroke="#555577" stroke-width="1.5"/>
  <line x1="400" y1="292" x2="400" y2="318" stroke="#555577" stroke-width="1.5"/>
  <line x1="630" y1="292" x2="630" y2="318" stroke="#555577" stroke-width="1.5"/>

  <!-- Alternative Suggester -->
  <rect x="80" y="320" width="180" height="36" rx="6" fill="#1e1e36" stroke="#3a3a5c" stroke-width="1"/>
  <text x="170" y="343" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">🔄 AlternativeSuggester</text>

  <!-- Experiment Search -->
  <rect x="310" y="320" width="180" height="36" rx="6" fill="#1e1e36" stroke="#3a3a5c" stroke-width="1"/>
  <text x="400" y="343" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">🔍 Experiment Search</text>

  <!-- Export Module -->
  <rect x="540" y="320" width="180" height="36" rx="6" fill="#1e1e36" stroke="#3a3a5c" stroke-width="1"/>
  <text x="630" y="343" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">📤 Export (JSON/MD/TXT)</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="390" width="800" height="10" fill="url(#accent)" rx="0"/>
</svg>
